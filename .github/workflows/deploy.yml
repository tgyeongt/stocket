name: Deploy

"on":
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            ulimit -n 65536

            cd ~/stocket
            git pull origin main

            # Backend: 의존성 + 빌드 + DB 마이그레이션
            yarn install
            yarn workspace backend build
            cd packages/backend
            ./node_modules/.bin/prisma migrate deploy
            cd ~/stocket

            # Data: Python 의존성
            cd packages/data
            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            deactivate
            cd ~/stocket

            # 서비스 재시작 (없으면 새로 시작)
            pm2 restart stocket-backend || pm2 start "yarn workspace backend start" --name stocket-backend --cwd ~/stocket
            pm2 restart stocket-data || pm2 start "venv/bin/uvicorn src.api.server:app --host 0.0.0.0 --port 8000" --name stocket-data --cwd ~/stocket/packages/data
            pm2 save
