name: Data Sync

on:
  schedule:
    - cron: "0 22 * * 1-5" # 평일 오전 7시 KST → 주가 동기화
    - cron: "0 17 * * 6" # 일요일 새벽 2시 KST → 재무제표 동기화
    - cron: "0 20 * * *" # 매일 새벽 5시 KST → 업종코드 보완 (indutyCode 없는 기업 채우기)
  workflow_dispatch:
    inputs:
      job:
        description: "실행할 작업"
        required: true
        type: choice
        default: sync-stocks
        options:
          - seed
          - sync-companies
          - sync-company-info
          - sync-stocks
          - sync-financials
      corp_codes:
        description: "재무제표 동기화 대상 기업 (공백 구분, 미입력 시 전체)"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Determine job to run
        id: job
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 22 * * 1-5" ]; then
              echo "name=sync-stocks" >> $GITHUB_OUTPUT
            elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
              echo "name=sync-company-info" >> $GITHUB_OUTPUT
            else
              echo "name=sync-financials" >> $GITHUB_OUTPUT
            fi
          else
            echo "name=${{ github.event.inputs.job }}" >> $GITHUB_OUTPUT
          fi

      - name: Execute on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/stocket
            git pull
            cd packages/data
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            JOB="${{ steps.job.outputs.name }}"
            LOG=~/logs/${JOB}.log
            echo "=== $(date) 시작: $JOB ===" >> $LOG

            case "$JOB" in
              seed)
                nohup python -m src.api.seed >> $LOG 2>&1 &
                ;;
              sync-companies)
                nohup python -m src.jobs.sync_companies_job >> $LOG 2>&1 &
                ;;
              sync-company-info)
                nohup python -m src.jobs.sync_company_info_job >> $LOG 2>&1 &
                ;;
              sync-stocks)
                nohup python -m src.jobs.sync_stocks_job >> $LOG 2>&1 &
                ;;
              sync-financials)
                CORP_CODES="${{ github.event.inputs.corp_codes }}"
                if [ -n "$CORP_CODES" ]; then
                  nohup python -m src.jobs.sync_financials_job --corp-codes $CORP_CODES >> $LOG 2>&1 &
                else
                  nohup python -m src.jobs.sync_financials_job >> $LOG 2>&1 &
                fi
                ;;
            esac

            echo "✅ $JOB 백그라운드 시작됨 (PID: $!)"
